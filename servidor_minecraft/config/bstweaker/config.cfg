# Configuration file

general {
    # Auto-generate tooltips.json entries for new weapons
    # 自动为新武器生成 tooltips.json 条目
    B:autoGenerateTooltips=true

    # Enable fast reload mode for /bst reload command
    # When enabled, only reloads BSTweaker resources instead of full F3+T refresh
    # 启用快速重载模式，仅重载 BSTweaker 资源而非完整 F3+T 刷新
    B:enableFastReload=true

    # Blacklist of weapon IDs to skip model auto-generation
    # Weapons in this list will NOT have models auto-generated
    # 模型生成黑名单，列表中的武器ID不会自动生成模型
    # Example: ["my_custom_sword", "special_dagger"]
    S:modelBlacklist <
     >
}


